<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GümrükPortal Cloud — Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script>let savedTheme = localStorage.getItem('gumruk_theme') || 'dark'; document.documentElement.setAttribute('data-theme', savedTheme);</script>
    <style>
        :root {--bg-main:#000;--bg-surface:#0a0d12;--bg-surface-hover:#18181b;--bg-elevated:#111620;--bg-hover:#161d2a;--border:rgba(255,255,255,0.06);--border-active:rgba(59,130,246,0.4);--primary:#3b82f6;--primary-hover:#2563eb;--accent:#60a5fa;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#475569;--danger:#ef4444;--success:#10b981;--warning:#f59e0b;--kiymet-color:#a855f7;--font-family:'Inter',-apple-system,sans-serif;--r-xl:20px;--r-lg:14px;--r-md:10px;--r-sm:7px;--sidebar-w:268px;--header-h:68px}
        [data-theme="light"] {--bg-main:#f1f5f9;--bg-surface:#ffffff;--bg-surface-hover:#f8fafc;--bg-elevated:#ffffff;--bg-hover:#e2e8f0;--input-bg:#ffffff;--border:rgba(0,0,0,0.15);--border-active:rgba(59,130,246,0.6);--text-primary:#0f172a;--text-secondary:#334155;--text-muted:#64748b;}
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-family); background:var(--bg-main); color:var(--text-primary); min-height:100vh; overflow-x:hidden; font-size:14px; -webkit-font-smoothing:antialiased; transition: background 0.3s, color 0.3s; }
        button, input, select, textarea { font-family:inherit; outline:none; border:none; }
        .hidden { display:none !important; } .hidden-role { display: none !important; }
        
        #login-screen { position:fixed; inset:0; z-index:99999; background: radial-gradient(ellipse at 30% 20%,rgba(59,130,246,0.18) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(168,85,247,0.12) 0%,transparent 50%),var(--bg-main); display:flex; align-items:center; justify-content:center; }
        .login-card { width:440px; padding:40px; background: var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-xl); box-shadow:0 40px 80px rgba(0,0,0,0.3); position:relative; overflow:hidden; }
        .login-logo { width:56px; height:56px; border-radius:16px; margin:0 auto 24px; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(59,130,246,0.4); }
        .login-title { font-size:24px; font-weight:700; text-align:center; letter-spacing:-0.5px; margin-bottom:6px; color:var(--text-primary); }
        .login-sub { text-align:center; color:var(--text-secondary); font-size:13px; margin-bottom:28px; }
        .login-input-wrap { position:relative; margin-bottom:16px; }
        .login-input-wrap > i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); width:18px; height:18px; z-index:2; pointer-events:none; }
        .login-input-wrap input { width:100%; padding:14px 16px 14px 46px; background:var(--input-bg); border:1px solid var(--border); border-radius:var(--r-md); color:var(--text-primary); font-size:14px; transition:0.2s; }
        .login-input-wrap input:focus { border-color:var(--border-active); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        .login-btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); color:#fff; font-size:14px; font-weight:600; border-radius:var(--r-md); cursor:pointer; transition:0.2s; box-shadow:0 4px 16px rgba(59,130,246,0.35); }
        .login-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(59,130,246,0.45); }
        .auth-error { color:var(--danger); text-align:center; margin-top:14px; font-size:12.5px; display:none; padding:10px; background:rgba(239,68,68,0.1); border-radius:var(--r-sm); border:1px solid rgba(239,68,68,0.2); }
        
        .app-wrap { display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:var(--sidebar-w); flex-shrink:0; display:flex; flex-direction:column; background:var(--bg-surface); border-right:1px solid var(--border); transition:margin-left 0.3s cubic-bezier(0.4,0,0.2,1); z-index:20; }
        .sidebar.collapsed { margin-left:calc(-1 * var(--sidebar-w)); }
        .sidebar-brand { padding:24px 22px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
        .brand-icon { width:38px; height:38px; border-radius:10px; flex-shrink:0; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(59,130,246,0.35); }
        .brand-icon i { color:#fff; width:18px; height:18px; }
        .brand-name { font-size:16px; font-weight:700; letter-spacing:-0.3px; white-space:nowrap; color:var(--text-primary); }
        .brand-status { display:flex; align-items:center; gap:5px; margin-top:2px; }
        .status-dot { width:6px; height:6px; border-radius:50%; background:var(--success); animation:pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
        .brand-status span { font-size:10px; font-weight:600; color:var(--success); text-transform:uppercase; letter-spacing:0.5px; }
        
        .sidebar-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:2px; }
        .sidebar-section-label { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; padding:10px 10px 6px; }
        .nav-btn { display:flex; align-items:center; gap:11px; width:100%; padding:10px 12px; border-radius:var(--r-md); color:var(--text-secondary); font-size:13.5px; font-weight:500; background:transparent; cursor:pointer; transition:all 0.18s; position:relative; }
        .nav-btn i { width:17px; height:17px; flex-shrink:0; }
        .nav-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
        .nav-btn.active { background:rgba(59,130,246,0.1); color:var(--primary); font-weight:600; }
        .nav-btn.active::before { content:''; position:absolute; left:0; top:25%; bottom:25%; width:3px; border-radius:0 2px 2px 0; background:var(--primary); }
        
        .sidebar-footer { padding:14px 12px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
        .footer-btn { display:flex; align-items:center; gap:9px; width:100%; padding:9px 12px; border-radius:var(--r-md); background:transparent; color:var(--text-secondary); font-size:12.5px; font-weight:500; cursor:pointer; transition:0.18s; border:1px solid transparent; }
        .footer-btn i { width:15px; height:15px; flex-shrink:0; }
        .footer-btn:hover { background:var(--bg-hover); border-color:var(--border); color:var(--text-primary); }
        .footer-btn.primary-subtle { color:var(--primary); border-color:rgba(59,130,246,0.2); background:rgba(59,130,246,0.05); }
        
        .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
        .top-header { height:var(--header-h); display:flex; align-items:center; justify-content:space-between; padding:0 28px; background:var(--bg-surface); border-bottom:1px solid var(--border); gap:16px; flex-shrink:0; z-index:10; }
        .header-left { display:flex; align-items:center; gap:14px; flex:1; }
        .menu-toggle { width:38px; height:38px; border-radius:var(--r-md); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); transition:0.18s; }
        .menu-toggle:hover { background:var(--bg-elevated); color:var(--text-primary); }
        
        .search-wrap { position:relative; display:flex; align-items:center; background:var(--input-bg); border:1px solid var(--border); border-radius:12px; padding:6px 16px; width:100%; max-width:550px; height:48px; transition:0.3s; }
        .search-wrap:focus-within { border-color:var(--primary); box-shadow:0 0 0 4px rgba(59,130,246,0.1); }
        .search-wrap > i { color:var(--primary); width:20px; height:20px; flex-shrink:0; }
        .search-wrap input { background:transparent; color:var(--text-primary); padding:0 12px; flex:1; font-size:14.5px; border:none; outline:none; }
        #live-search-dropdown { display:none; position:absolute; top:calc(100% + 8px); left:-14px; right:-14px; background:var(--bg-elevated); border:1px solid var(--border-active); border-radius:var(--r-lg); max-height:420px; overflow-y:auto; z-index:999999; box-shadow:0 24px 60px rgba(0,0,0,0.8); }
        #live-search-dropdown.show { display:block; }
        .ls-item { padding:12px 16px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .ls-item:hover { background:var(--bg-hover); }
        .ls-item-title { font-weight:600; color:var(--text-primary); font-size:13px; }
        .ls-item-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
        .ls-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:5px; }
        
        .header-right { display:flex; align-items:center; gap:10px; }
        .hdr-icon-btn { width:38px; height:38px; border-radius:var(--r-md); border:1px solid var(--border); background:var(--bg-elevated); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.18s; }
        .hdr-icon-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--bg-hover); }
        .divider-v { width:1px; height:24px; background:var(--border); }
        .user-pill { display:flex; align-items:center; gap:9px; padding:5px 12px 5px 6px; border-radius:20px; border:1px solid var(--border); background:var(--bg-elevated); cursor:pointer; }
        .user-avatar { width:28px; height:28px; border-radius:50%; }
        .user-info .user-name { font-size:13px; font-weight:600; line-height:1.2; }
        .user-info .user-role { font-size:11px; color:var(--text-secondary); }
        
        .view-area { flex:1; overflow-y:auto; padding:36px 32px; scroll-behavior:smooth; position:relative; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation:fadeUp 0.3s ease forwards; }
        
        .page-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
        .page-eyebrow { font-size:11px; font-weight:600; color:var(--primary); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
        .page-title { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
        .page-actions { display:flex; align-items:center; gap:10px; }
        
        .card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); }
        .card-pad { padding:24px; }
        
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:20px; margin-bottom:28px; }
        .stat-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:24px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
        .stat-card:hover { transform:translateY(-2px); border-color:var(--border-active); box-shadow:0 10px 20px rgba(0,0,0,0.1); }
        .stat-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
        .stat-icon-box { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; }
        .stat-icon-box i { width:20px; height:20px; }
        .stat-icon-box.blue { background:rgba(59,130,246,0.12); color:var(--primary); }
        .stat-icon-box.green { background:rgba(16,185,129,0.12); color:var(--success); }
        .stat-icon-box.yellow { background:rgba(245,158,11,0.12); color:var(--warning); }
        .stat-icon-box.purple { background:rgba(168,85,247,0.12); color:var(--kiymet-color); }
        .stat-trend { font-size:11px; font-weight:600; padding:3px 8px; border-radius:6px; }
        .stat-value { font-size:34px; font-weight:700; letter-spacing:-1px; line-height:1; margin-bottom:4px; }
        .stat-label { font-size:13px; color:var(--text-secondary); font-weight:500; }
        
        .table-wrap { overflow:auto; max-height:calc(100vh - var(--header-h) - 200px); }
        .data-table { width:100%; border-collapse:separate; border-spacing:0; font-size:12.5px; }
        .data-table th { padding:11px 14px; text-align:left; font-weight:600; color:var(--text-muted); font-size:10.5px; text-transform:uppercase; border-bottom:1px solid var(--border); background:var(--bg-surface); position:sticky; top:0; z-index:10; white-space:nowrap; }
        .data-table td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; white-space:nowrap; }
        .data-table tbody tr:hover td { background:var(--bg-hover); }
        
        .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:5px; font-size:11px; font-weight:600; }
        .badge-warning { background:rgba(245,158,11,0.1); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }
        .badge-dark { background:var(--input-bg); color:var(--text-secondary); border:1px solid var(--border); }
        
        .btn-primary { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; background:var(--primary); color:#fff; border-radius:var(--r-md); font-size:13px; font-weight:600; cursor:pointer; }
        .btn-sm { display:inline-flex; align-items:center; gap:7px; padding:8px 14px; background:var(--bg-elevated); color:var(--text-primary); border-radius:var(--r-md); font-size:12.5px; font-weight:500; cursor:pointer; border:1px solid var(--border); }
        .btn-danger { background:rgba(239,68,68,0.1); color:#f87171; border-color:rgba(239,68,68,0.25)!important; }
        .icon-btn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:var(--r-sm); cursor:pointer; border:1px solid transparent; background:transparent; color:var(--text-secondary); }
        .icon-btn:hover { background:var(--bg-hover); color:var(--primary); }
        .text-danger-btn:hover { color:#f87171; background:rgba(239,68,68,0.08); }
        
        .toolbar { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); margin-bottom:18px; }
        .toolbar-left, .toolbar-right { display:flex; align-items:center; gap:10px; }
        
        .input-group { margin-bottom:18px; position:relative; }
        .input-group label { display:block; margin-bottom:6px; font-size:11.5px; color:var(--text-secondary); font-weight:600; text-transform:uppercase; }
        input[type="text"], input[type="password"], input[type="date"], select, textarea { width:100%; padding:10px 12px; border-radius:var(--r-md); background:var(--input-bg); color:var(--text-primary); border:1px solid var(--border); font-size:13px; font-family:inherit; }
        input:focus, select:focus, textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        select option { background:var(--bg-surface); color:var(--text-primary); }
        
        .custom-cb { appearance:none; width:15px; height:15px; background:var(--input-bg); border:1px solid var(--border); border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
        .custom-cb:checked { background:var(--primary); border-color:var(--primary); }
        
        .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); z-index:9000; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--r-xl); padding:0; width:95%; max-width:700px; max-height:92vh; overflow:hidden; display:flex; flex-direction:column; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; padding:24px 28px; border-bottom:1px solid var(--border); }
        .modal-body { padding:28px; overflow-y:auto; flex:1; }
        .modal-footer { padding:20px 28px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; background:var(--bg-surface); }
        .modal-section { background:var(--input-bg); border:1px solid var(--border); border-radius:var(--r-md); padding:20px; margin-bottom:20px; }
        .modal-section-title { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom:16px; }
        
        .calc-grid { display:grid; grid-template-columns:1.3fr 1fr; gap:32px; }
        .result-panel { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:28px; position:sticky; top:0; }
        .calc-result-table { width:100%; border-collapse:collapse; font-size:13px; }
        .calc-result-table td { padding:10px 14px; border-bottom:1px solid var(--border); }
        .result-total { display:flex; justify-content:space-between; align-items:center; background:linear-gradient(135deg,var(--primary) 0%,#7c3aed 100%); padding:20px; border-radius:var(--r-md); margin-top:16px; }
        
        .kur-panel { display:flex; gap:12px; align-items:flex-end; padding:16px; background:rgba(59,130,246,0.05); border:1px solid rgba(59,130,246,0.15); border-radius:var(--r-md); margin-bottom:20px; }
        .kur-badge { padding:4px 10px; border-radius:6px; font-size:11px; font-weight:700; }
        .kur-live { background:rgba(16,185,129,0.1); color:var(--success); border:1px solid rgba(16,185,129,0.2); }
        .kur-manual { background:rgba(245,158,11,0.1); color:var(--warning); border:1px solid rgba(245,158,11,0.2); }
        
        .teslim-toggle { display:flex; background:var(--input-bg); border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; }
        .teslim-opt { flex:1; padding:10px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; border-right:1px solid var(--border); }
        .teslim-opt:last-child { border-right:none; }
        .teslim-opt.active { background:var(--primary); color:#fff; }
        
        .autocomplete-list { position:absolute; top:100%; left:0; right:0; background:var(--bg-elevated); border:1px solid var(--border-active); border-radius:0 0 var(--r-md) var(--r-md); max-height:220px; overflow-y:auto; z-index:9999; display:none; box-shadow:0 12px 28px rgba(0,0,0,0.4); }
        .autocomplete-list.show { display:block; }
        .autocomplete-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; flex-direction:column; }
        .autocomplete-item:hover { background:var(--bg-hover); border-left:3px solid var(--primary); }
        
        /* TCGB ÖZEL CSS (YAZDIRMA DESTEKLİ) */
        .tcgb-container { background:#fff; color:#000; width:100%; max-width:1000px; margin:0 auto; font-family:Arial, sans-serif; border-radius: 4px; overflow: hidden; padding: 20px;}
        .tcgb-grid { display: grid; grid-template-columns: repeat(8, 1fr); border-top: 1px solid #2f5d34; border-left: 1px solid #2f5d34; }
        .tcgb-box { border-right: 1px solid #2f5d34; border-bottom: 1px solid #2f5d34; padding: 6px; position: relative; }
        .tcgb-label { font-size: 10px; font-weight: bold; color: #2f5d34; margin-bottom: 4px; display: block; text-transform: uppercase; }
        .tcgb-input { width: 100%; border: none !important; background: transparent !important; font-family: monospace; font-size: 13px; color: #000; font-weight: 600; padding:0; box-shadow:none !important; }
        .tcgb-table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 4px; }
        .tcgb-table th { border-bottom: 1px solid #ccc; font-size: 10px; color: #555; padding-bottom: 2px; }
        
        @media print {
            body * { visibility: hidden; }
            #tcgb-print-area, #tcgb-print-area * { visibility: visible; }
            #tcgb-print-area { position: absolute; left: 0; top: 0; width: 100%; padding:0; }
            .sidebar, .top-header, .page-hdr, .page-actions { display: none !important; }
            body { background: #fff; }
        }
        
        #sync-toast { position:fixed; bottom:24px; right:24px; background:var(--bg-elevated); border:1px solid var(--border); padding:12px 18px; border-radius:var(--r-lg); display:flex; align-items:center; gap:12px; transform:translateY(100px); opacity:0; transition:0.4s; z-index:99999; }
        #sync-toast.show { transform:translateY(0); opacity:1; }
        .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="sync-toast"><div id="sync-icon" class="spinner"></div><span id="sync-text" style="font-size:13px;">Firebase eşitleniyor...</span></div>

<div id="login-screen">
    <div class="login-card">
        <div class="login-logo"><i data-lucide="shield-check" style="color:#fff;width:24px;height:24px;"></i></div>
        <h1 class="login-title">GümrükPortal</h1>
        <p class="login-sub">Kurumsal Müşteri ve Yönetim Paneli</p>
        <div id="auth-alert" class="auth-error"></div>
        <div class="login-input-wrap"><i data-lucide="user"></i><input type="text" id="log-email" placeholder="Kullanıcı Adı" onkeyup="if(event.key==='Enter')window.doLogin()"></div>
        <div class="login-input-wrap"><i data-lucide="lock"></i><input type="password" id="log-pass" placeholder="Şifreniz" onkeyup="if(event.key==='Enter')window.doLogin()"></div>
        <button class="login-btn" onclick="window.doLogin()">Sisteme Giriş Yap</button>
    </div>
</div>

<div id="app-screen" class="app-wrap">
    <aside class="sidebar">
        <div class="sidebar-brand"><div class="brand-icon"><i data-lucide="layers"></i></div><div class="brand-text"><div class="brand-name">GümrükPortal</div></div></div>
        <nav class="sidebar-nav">

<script>
    // --- JS LOGIC (COMPRESSED) ---
    window.GondericiList = [{id:"21US000661501",ad:"34 LLC SUNA TATAR"},{id:"25DE000992490",ad:"HM AUTOMOBİLE"}]; // Örnek data kısaltıldı
    window.GTIPList = [{kod:"8703.23.19.12.00",desc:"1600-2000 cm³ binek (yeni)"},{kod:"8703.80.10.00.11",desc:"Sadece elektrikli"}];
    
    window.declarationsData=[]; window.firmData={"ŞAMNU GT":[]}; 

    window.doLogin = function() {
        const u = document.getElementById('log-email').value.trim().toLowerCase(), p = document.getElementById('log-pass').value;
        const acc = {'admin':{pass:'Bayram2026',role:'admin'}, 'samnu':{pass:'samnu2026',role:'ŞAMNU GT'}};
        if(acc[u] && acc[u].pass === p) {
            localStorage.setItem('gumruk_auth','true'); localStorage.setItem('gumruk_role',acc[u].role);
            document.getElementById('login-screen').style.display='none'; window.applyRoleUI(); window.renderView(acc[u].role==='admin'?'dashboard':'declarations');

    window.applyRoleUI = function() {
        let r = localStorage.getItem('gumruk_role')||'admin';
        document.querySelectorAll('.admin-only').forEach(el => r!=='admin'?el.classList.add('hidden-role'):el.classList.remove('hidden-role'));

    window.addGondericiPrompt = function() {
        let ad=prompt("Firma Adı:"), id=prompt("Firma ID:");
        if(ad&&id) { window.GondericiList.unshift({id:id.trim(), ad:ad.trim().toUpperCase()}); window.saveData(); }
    };
    window.addGTIPPrompt = function() {
        let k=prompt("GTİP Kodu:"), d=prompt("Açıklama:");
        if(k&&d) { window.GTIPList.unshift({kod:k.trim(), desc:d.trim()}); window.saveData(); }
    };

    window.filterList = function(type, val) {
        let el = document.getElementById(`da-${type}-list`); let q = val.toLowerCase();
        let arr = type==='gonderici' ? window.GondericiList : window.GTIPList;
        let m = q ? arr.filter(x => (x.ad||x.desc).toLowerCase().includes(q) || (x.id||x.kod).includes(q)) : arr;
        if(m.length>0) {
            el.innerHTML = m.map(x => `<div class="autocomplete-item" onmousedown="document.getElementById('da-${type}').value='${type==='gonderici'?x.id+' - '+x.ad:x.kod}';this.parentElement.classList.remove('show')"><b>${type==='gonderici'?x.ad:x.kod}</b></div>`).join('');
            el.classList.add('show');
        } else el.classList.remove('show');
    };

    window.openDeclVehicleModal = function(idx, ctx) {
        document.getElementById('decl-modal').classList.remove('hidden'); document.getElementById('decl-edit-idx').value=idx;

            document.getElementById('da-tarih').value = new Date().toISOString().split('T')[0];
            document.getElementById('da-evrak').value = 'Açık'; // YENİ KAYITTA AÇIK GELİR

            let d = window.declarationsData[idx];
            ['firma','sase','marka','fatura','evrakLink','gonderici','gtip','brut','net'].forEach(id=>document.getElementById('da-'+id).value=d[id]||'');
        }
    };

        let v=id=>document.getElementById(id).value;

        let i = parseInt(v('decl-edit-idx'));
        if(i===-1) window.declarationsData.unshift(r); else window.declarationsData[i] = r;
        window.saveData(); document.getElementById('decl-modal').classList.add('hidden'); window.renderDeclarationsTable();
    };

                <button class="icon-btn admin-only" style="color:#10b981" onclick="window.openBeyanname(${i})"><i data-lucide="file-signature"></i></button>
                <button class="icon-btn admin-only" onclick="window.openDeclVehicleModal(${i})"><i data-lucide="edit-3"></i></button>
            </td>
        </tr>`).join('');
        window.applyRoleUI(); if(window.lucide) lucide.createIcons();
    };

    window.openBeyanname = function(idx) {
        let d = window.declarationsData[idx]; if(!d) return;
        window.renderView('beyanname');
        setTimeout(() => {
            document.getElementById('tcgb-2').value = d.gonderici||''; document.getElementById('tcgb-8').value = d.firma||'';
            document.getElementById('tcgb-33').value = d.gtip||''; document.getElementById('tcgb-35').value = d.brut||''; document.getElementById('tcgb-38').value = d.net||'';
            document.getElementById('tcgb-31').value = `MARKA: ${d.marka||''}\nŞASİ NO: ${d.sasi||''}`;
        }, 100);
    };

    window.setCalcTeslim = function(val, el) {
        el.parentElement.querySelectorAll('.teslim-opt').forEach(o => o.classList.remove('active'));
        el.classList.add('active'); document.getElementById('calc-teslim').value = val; window.calculateTaxes();
    };

    // TCMB GÜNLÜK KUR ÇEKME (CANLI DEĞİL - SAAT 15:30 XML)
    window.fetchTCMBKur = async function(auto=false) {
        try {
            const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.tcmb.gov.tr/kurlar/today.xml"));
            const xml = new DOMParser().parseFromString(await res.text(), "text/xml");
            const cur = xml.getElementsByTagName("Currency");
            for(let i=0; i<cur.length; i++) {
                let code = cur[i].getAttribute("CurrencyCode");
                let sell = cur[i].getElementsByTagName("ForexSelling")[0];
                if(sell) {
                    let val = parseFloat(sell.textContent.replace(',','.'));
                    if(code==="USD" && document.getElementById('calc-kur-usd')) document.getElementById('calc-kur-usd').value = val.toFixed(4).replace('.',',');
                    if(code==="EUR" && document.getElementById('calc-kur-eur')) document.getElementById('calc-kur-eur').value = val.toFixed(4).replace('.',',');
                }
            }
            if(!auto) alert("TCMB Günlük Kur (15:30) başarıyla çekildi!");
            window.calculateTaxes();
        } catch(e) { console.log("Kur Hatası"); }
    };

    window.calculateTaxes = function() {
        let gV=id=>parseFloat(String(document.getElementById(id)?.value||'0').replace(/\./g,"").replace(/,/g,"."))||0;
        let sH=(id,v)=>document.getElementById(id).innerText=v.toLocaleString('tr-TR',{maximumFractionDigits:0})+" ₺";
        
        let kur=gV("calc-kur-eur"), fat=gV("calc-fatura"), nav=document.getElementById('calc-teslim').value==='CIF'?0:gV("calc-navlun");
        let cif = (fat+nav)*kur; sH("res-cif", cif);
        
        let gvT = cif * (gV('calc-gv-oran')/100); sH('res-gv-tutar', gvT);
        let otvM = cif + gvT; sH('res-otv-tutar', otvM * (gV('calc-otv-oran')/100));
        let kdvT = (otvM + (otvM * (gV('calc-otv-oran')/100))) * 0.20; sH('res-kdv-tutar', kdvT);
        
        document.getElementById('res-genel-maliyet').innerText = (cif+gvT+(otvM * (gV('calc-otv-oran')/100))+kdvT).toLocaleString('tr-TR')+" ₺";
    };

    // KURUMSAL WORD ÇIKTISI EFSANESİ
    window.exportToWord = function() {
        const getV=id=>document.getElementById(id).innerText, getI=id=>document.getElementById(id).value;
        const html = `<html><head><meta charset='utf-8'><style>body{font-family:Arial;color:#1e293b} h1{color:#1e3a8a;border-bottom:2px solid;text-align:center} table{width:100%;border-collapse:collapse;margin-top:10px} th,td{border:1px solid #ccc;padding:10px;text-align:left} th{background:#f8fafc} .total{background:#10b981;color:#fff;font-weight:bold;font-size:18px}</style></head><body>
            <h1>KURUMSAL GÜMRÜK MALİYET ANALİZİ</h1>
            <p><b>Tarih:</b> ${new Date().toLocaleDateString('tr-TR')}</p>
            <table><tr><th>Teslim Şekli</th><td>${getI('calc-teslim')}</td></tr><tr><th>Kur</th><td>${getI('calc-kur-eur')}</td></tr></table>
            <h3>Vergi ve Maliyet (TL)</h3>
            <table><tr><th>C.I.F Kıymet</th><td>${getV('res-cif')}</td></tr><tr><th>Gümrük V.</th><td>${getV('res-gv-tutar')}</td></tr><tr><th>ÖTV</th><td>${getV('res-otv-tutar')}</td></tr><tr><th>KDV</th><td>${getV('res-kdv-tutar')}</td></tr>
            <tr class="total"><th>FİNAL MALİYET</th><td>${document.getElementById('res-genel-maliyet').innerText}</td></tr></table>
            <p style="text-align:right;margin-top:50px">Gümrük Müşavirliği<br>Kaşe & İmza</p>
        </body></html>`;
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(['\ufeff', html],{type:'application/msword'})); a.download = 'Kurumsal_Maliyet_Raporu.doc'; a.click();
    };

    window.saveData = function() {
        if(window._firebaseSave) window._firebaseSave({decl:window.declarationsData, firm:window.firmData, gonderici:window.GondericiList, gtip:window.GTIPList});
    };

    window.renderView=function(vn) {
        document.getElementById('view-container').innerHTML = document.getElementById('tpl-'+vn).innerHTML;
        if(vn==='declarations') window.renderDeclarationsTable();
        if(vn==='calculator') window.calculateTaxes();
        if(window.lucide) lucide.createIcons();
    };

    document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.addEventListener('click',()=>window.renderView(b.dataset.view)));
    document.addEventListener('DOMContentLoaded',() => {
        if(localStorage.getItem('gumruk_auth')==='true') { document.getElementById('login-screen').style.display='none'; window.applyRoleUI(); window.renderView('declarations'); }
        if(window._firebaseReady) window._firebaseLoad().then(d=>{if(d){window.declarationsData=d.decl||[]; window.GondericiList=d.gonderici||window.GondericiList; window.GTIPList=d.gtip||window.GTIPList;} window.renderDeclarationsTable();});
        if(window.lucide) lucide.createIcons();
    });
</script>
</body>
</html>
