<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GümrükPortal Cloud — Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script>
        let savedTheme = localStorage.getItem('gumruk_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --bg-main:#000;--bg-surface:#0a0d12;--bg-surface-hover:#18181b;--bg-elevated:#111620;--bg-hover:#161d2a;--border:rgba(255,255,255,0.06);--border-active:rgba(59,130,246,0.4);--primary:#3b82f6;--primary-hover:#2563eb;--accent:#60a5fa;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#475569;--danger:#ef4444;--success:#10b981;--warning:#f59e0b;--kiymet-color:#a855f7;--font-family:'Inter',-apple-system,sans-serif;--r-xl:20px;--r-lg:14px;--r-md:10px;--r-sm:7px;--sidebar-w:268px;--header-h:68px
        }
        [data-theme="light"] {
            --bg-main: #f1f5f9; --bg-surface: #ffffff; --bg-surface-hover: #f8fafc; --bg-elevated: #ffffff; --bg-hover: #e2e8f0; --input-bg: #ffffff; --border: rgba(0,0,0,0.15); --border-active: rgba(59,130,246,0.6); --text-primary: #0f172a; --text-secondary: #334155; --text-muted: #64748b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-family); background:var(--bg-main); color:var(--text-primary); min-height:100vh; overflow-x:hidden; font-size:14px; -webkit-font-smoothing:antialiased; transition: background 0.3s, color 0.3s; }
        button, input, select, textarea { font-family:inherit; outline:none; border:none; }
        .hidden { display:none !important; }
        .hidden-role { display: none !important; }
        
        #login-screen { position:fixed; inset:0; z-index:99999; background: radial-gradient(ellipse at 30% 20%,rgba(59,130,246,0.18) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(168,85,247,0.12) 0%,transparent 50%),var(--bg-main); display:flex; align-items:center; justify-content:center; }
        .login-card { width:440px; padding:40px; background: var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-xl); box-shadow:0 40px 80px rgba(0,0,0,0.3); position:relative; overflow:hidden; }
        .login-logo { width:56px; height:56px; border-radius:16px; margin:0 auto 24px; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(59,130,246,0.4); }
        .login-title { font-size:24px; font-weight:700; text-align:center; letter-spacing:-0.5px; margin-bottom:6px; color:var(--text-primary); }
        .login-sub { text-align:center; color:var(--text-secondary); font-size:13px; margin-bottom:28px; }
        .login-input-wrap { position:relative; margin-bottom:16px; }
        .login-input-wrap > i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); width:18px; height:18px; z-index:2; pointer-events:none; }
        .login-input-wrap input { width:100%; padding:14px 16px 14px 46px; background:var(--input-bg); border:1px solid var(--border); border-radius:var(--r-md); color:var(--text-primary); font-size:14px; transition:0.2s; }
        .login-input-wrap input:focus { border-color:var(--border-active); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        .login-btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); color:#fff; font-size:14px; font-weight:600; border-radius:var(--r-md); cursor:pointer; transition:0.2s; box-shadow:0 4px 16px rgba(59,130,246,0.35); }
        
        .app-wrap { display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:var(--sidebar-w); flex-shrink:0; display:flex; flex-direction:column; background:var(--bg-surface); border-right:1px solid var(--border); transition:margin-left 0.3s cubic-bezier(0.4,0,0.2,1); z-index:20; }
        .sidebar.collapsed { margin-left:calc(-1 * var(--sidebar-w)); }
        .sidebar-brand { padding:24px 22px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
        .brand-icon { width:38px; height:38px; border-radius:10px; flex-shrink:0; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(59,130,246,0.35); }
        .brand-icon i { color:#fff; width:18px; height:18px; }
        .brand-name { font-size:16px; font-weight:700; color:var(--text-primary); }
        
        .sidebar-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:2px; }
        .sidebar-section-label { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; padding:10px 10px 6px; }
        .nav-btn { display:flex; align-items:center; gap:11px; width:100%; padding:10px 12px; border-radius:var(--r-md); color:var(--text-secondary); font-size:13.5px; font-weight:500; background:transparent; cursor:pointer; transition:all 0.18s; }
        .nav-btn i { width:17px; height:17px; }
        .nav-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
        .nav-btn.active { background:rgba(59,130,246,0.1); color:var(--primary); font-weight:600; }
        
        .sidebar-footer { padding:14px 12px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
        .footer-btn { display:flex; align-items:center; gap:9px; width:100%; padding:9px 12px; border-radius:var(--r-md); background:transparent; color:var(--text-secondary); font-size:12.5px; font-weight:500; cursor:pointer; }
        .footer-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
        .footer-btn.primary-subtle { color:var(--primary); background:rgba(59,130,246,0.05); }
        
        .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
        .top-header { height:var(--header-h); display:flex; align-items:center; justify-content:space-between; padding:0 28px; background:var(--bg-surface); border-bottom:1px solid var(--border); flex-shrink:0; }
        .header-left { display:flex; align-items:center; gap:14px; flex:1; }
        .menu-toggle { width:38px; height:38px; border-radius:var(--r-md); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); }
        .menu-toggle:hover { background:var(--bg-elevated); color:var(--text-primary); }
        
        .header-right { display:flex; align-items:center; gap:10px; }
        .hdr-icon-btn { width:38px; height:38px; border-radius:var(--r-md); border:1px solid var(--border); background:var(--bg-elevated); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .user-pill { display:flex; align-items:center; gap:9px; padding:5px 12px 5px 6px; border-radius:20px; border:1px solid var(--border); background:var(--bg-elevated); cursor:pointer; }
        .user-avatar { width:28px; height:28px; border-radius:50%; }
        .user-info .user-name { font-size:13px; font-weight:600; line-height:1.2; }
        .user-info .user-role { font-size:11px; color:var(--text-secondary); }
        
        .view-area { flex:1; overflow-y:auto; padding:36px 32px; scroll-behavior:smooth; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation:fadeUp 0.3s ease forwards; }
        
        .page-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
        .page-title { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
        .card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); }
        
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:20px; margin-bottom:28px; }
        .stat-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:24px; cursor:pointer; }
        .stat-value { font-size:34px; font-weight:700; margin-bottom:4px; line-height:1; }
        .stat-label { font-size:13px; color:var(--text-secondary); font-weight:500; }
        
        .table-wrap { overflow:auto; max-height:calc(100vh - var(--header-h) - 200px); }
        .data-table { width:100%; border-collapse:separate; border-spacing:0; font-size:12.5px; }
        .data-table th { padding:11px 14px; text-align:left; font-weight:600; color:var(--text-muted); font-size:10.5px; border-bottom:1px solid var(--border); background:var(--bg-surface); position:sticky; top:0; z-index:10; white-space:nowrap; }
        .data-table td { padding:12px 14px; border-bottom:1px solid var(--border); white-space:nowrap; }
        
        .badge { display:inline-flex; padding:3px 9px; border-radius:5px; font-size:11px; font-weight:600; }
        .badge-warning { background:rgba(245,158,11,0.1); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }
        .badge-dark { background:var(--input-bg); color:var(--text-secondary); border:1px solid var(--border); }
        
        .btn-primary { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; background:var(--primary); color:#fff; border-radius:var(--r-md); font-size:13px; font-weight:600; cursor:pointer; }
        .btn-sm { display:inline-flex; align-items:center; gap:7px; padding:8px 14px; background:var(--bg-elevated); color:var(--text-primary); border-radius:var(--r-md); font-size:12.5px; font-weight:500; cursor:pointer; border:1px solid var(--border); }
        .icon-btn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:var(--r-sm); cursor:pointer; border:1px solid transparent; background:transparent; color:var(--text-secondary); }
        .icon-btn:hover { background:var(--bg-hover); color:var(--primary); }
        .text-danger-btn:hover { color:#f87171; background:rgba(239,68,68,0.08); }
        
        .toolbar { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); margin-bottom:18px; }
        .input-group { margin-bottom:18px; position:relative; }
        .input-group label { display:block; margin-bottom:6px; font-size:11.5px; color:var(--text-secondary); font-weight:600; text-transform:uppercase; }
        input[type="text"], input[type="password"], input[type="date"], select, textarea { width:100%; padding:10px 12px; border-radius:var(--r-md); background:var(--input-bg); color:var(--text-primary); border:1px solid var(--border); font-size:13px; font-family:inherit; outline:none; }
        input:focus, select:focus, textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        
        .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); z-index:9000; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--r-xl); padding:0; width:95%; max-width:700px; max-height:92vh; overflow:hidden; display:flex; flex-direction:column; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; padding:24px 28px; border-bottom:1px solid var(--border); }
        .modal-body { padding:28px; overflow-y:auto; flex:1; }
        .modal-footer { padding:20px 28px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; background:var(--bg-surface); }
        .modal-section { background:var(--input-bg); border:1px solid var(--border); border-radius:var(--r-md); padding:20px; margin-bottom:20px; }
        .modal-section-title { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom:16px; }
        
        .autocomplete-list { position:absolute; top:100%; left:0; right:0; background:var(--bg-elevated); border:1px solid var(--border-active); border-radius:0 0 var(--r-md) var(--r-md); max-height:220px; overflow-y:auto; z-index:9999; display:none; box-shadow:0 12px 28px rgba(0,0,0,0.4); }
        .autocomplete-list.show { display:block; }
        .autocomplete-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; flex-direction:column; transition:0.1s; }
        .autocomplete-item:hover { background:var(--bg-hover); border-left:3px solid var(--primary); padding-left:11px; }
        
        #sync-toast { position:fixed; bottom:24px; right:24px; background:var(--bg-elevated); border:1px solid var(--border); padding:12px 18px; border-radius:var(--r-lg); display:flex; align-items:center; gap:12px; transform:translateY(100px); opacity:0; transition:0.4s; z-index:99999; }
        #sync-toast.show { transform:translateY(0); opacity:1; }
        
        /* TCGB ÖZEL CSS (YAZDIRMA DESTEKLİ) */
        .tcgb-container { background:#fff; color:#000; width:100%; max-width:1000px; margin:0 auto; font-family:Arial, sans-serif; border-radius: 4px; overflow: hidden; padding: 20px;}
        .tcgb-grid { display: grid; grid-template-columns: repeat(8, 1fr); border-top: 1px solid #2f5d34; border-left: 1px solid #2f5d34; }
        .tcgb-box { border-right: 1px solid #2f5d34; border-bottom: 1px solid #2f5d34; padding: 6px; position: relative; }
        .tcgb-label { font-size: 10px; font-weight: bold; color: #2f5d34; margin-bottom: 4px; display: block; text-transform: uppercase; }
        .tcgb-input { width: 100%; border: none !important; background: transparent !important; font-family: monospace; font-size: 13px; color: #000; font-weight: 600; padding:0; box-shadow:none !important; outline:none; }
        .tcgb-table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 4px; }
        .tcgb-table th { border-bottom: 1px solid #ccc; font-size: 10px; color: #555; padding-bottom: 2px; }
        @media print {
            body * { visibility: hidden; }
            #tcgb-print-area, #tcgb-print-area * { visibility: visible; }
            #tcgb-print-area { position: absolute; left: 0; top: 0; width: 100%; padding:0; }
            .sidebar, .top-header, .page-hdr, .page-actions { display: none !important; }
            body { background: #fff; }
        }
    </style>
</head>
<body>

<div id="sync-toast"><span id="sync-text" style="font-size:13px;">Firebase eşitleniyor...</span></div>

<div id="login-screen">
    <div class="login-card">
        <h1 class="login-title">GümrükPortal</h1>
        <div id="auth-alert" class="auth-error"></div>
        <div class="login-input-wrap"><input type="text" id="log-email" placeholder="Kullanıcı Adı" onkeyup="if(event.key==='Enter')window.doLogin()"></div>
        <div class="login-input-wrap"><input type="password" id="log-pass" placeholder="Şifreniz" onkeyup="if(event.key==='Enter')window.doLogin()"></div>
        <button class="login-btn" onclick="window.doLogin()">Sisteme Giriş Yap</button>
    </div>
</div>

<div id="app-screen" class="app-wrap">
    <aside class="sidebar">
        <div class="sidebar-brand"><div class="brand-name">GümrükPortal</div></div>
        <nav class="sidebar-nav">
            <button class="nav-btn active" data-view="dashboard">Sistem Özeti</button>
            <div class="sidebar-section-label">Yönetim</div>
            <button class="nav-btn" data-view="declarations">Gelen Araçlar</button>
            <button class="nav-btn admin-only" data-view="beyanname">Beyanname Formu</button>
        </nav>
    </aside>
    <main class="main-content">
        <header class="top-header">
            <div class="header-left"><button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('collapsed')"><i data-lucide="menu"></i></button></div>
            <div class="header-right">
                <button class="hdr-icon-btn" onclick="window.toggleTheme()"><i data-lucide="moon"></i></button>
                <div class="user-pill" onclick="if(confirm('Çıkış yapılsın mı?')){localStorage.removeItem('gumruk_auth');location.reload();}">
                    <div class="user-info"><div class="user-name">Kullanıcı</div><div class="user-role">Rol</div></div>
                </div>
            </div>
        </header>
        <div id="view-container" class="view-area"></div>
    </main>
</div>

<template id="tpl-dashboard">
    <div class="page-hdr fade-in"><div><h1 class="page-title">Sistem Özeti</h1></div></div>
</template>

<template id="tpl-declarations">
    <div class="page-hdr fade-in"><div><h1 class="page-title">Gelen Araçlar</h1></div></div>
    <div class="toolbar fade-in">
        <div class="toolbar-left"><select id="decl-status-filter" onchange="window.renderDeclarationsTable()" style="width:200px;"><option value="all">Tüm Araçlar</option></select></div>
        <div class="toolbar-right"><button class="btn-primary admin-only" onclick="window.openDeclVehicleModal(-1,'decl')">Yeni Kayıt</button></div>
    </div>
    <div class="card fade-in" style="padding:0;overflow:hidden;"><div class="table-wrap"><table class="data-table">
        <thead><tr><th>FİRMA/ARAÇ</th><th>ŞASİ NO</th><th>G.TARİHİ</th><th>DURUM</th><th>FATURA</th><th style="text-align:center;">İŞLEM</th></tr></thead>
        <tbody id="declarations-tbody"></tbody>
    </table></div></div>
</template>

<template id="tpl-beyanname">
    <div class="page-hdr fade-in"><div><h1 class="page-title">Gümrük Beyannamesi (TCGB)</h1></div><button class="btn-primary" onclick="window.print()">Yazdır</button></div>
    <div id="tcgb-print-area" class="tcgb-container fade-in">
        <h2 style="text-align:center;color:#2f5d34;padding-bottom:10px;">T.C. GÜMRÜK BEYANNAMESİ</h2>
        <div class="tcgb-grid">
            <div class="tcgb-box" style="grid-column:span 1;"><span class="tcgb-label">1 BEYAN</span><input id="tcgb-1" class="tcgb-input" value="IM  4"></div>
            <div class="tcgb-box" style="grid-column:span 3;"><span class="tcgb-label">2 Gönderici / İhracatçı</span><textarea id="tcgb-2" class="tcgb-input" rows="2"></textarea></div>
            <div class="tcgb-box" style="grid-column:span 4;"><span class="tcgb-label">8 Alıcı</span><textarea id="tcgb-8" class="tcgb-input" rows="2"></textarea></div>
            
            <div class="tcgb-box" style="grid-column:span 4;"><span class="tcgb-label">31 Kaplar ve Eşyanın Tanımı</span><textarea id="tcgb-31" class="tcgb-input" rows="5"></textarea></div>
            <div class="tcgb-box" style="grid-column:span 2;"><span class="tcgb-label">33 Eşya Kodu</span><input id="tcgb-33" class="tcgb-input"><br><span class="tcgb-label" style="margin-top:5px">35 Brüt Ağırlık</span><input id="tcgb-35" class="tcgb-input"></div>
            <div class="tcgb-box" style="grid-column:span 2;"><span class="tcgb-label">37 Rejim</span><input id="tcgb-37" class="tcgb-input" value="4000"><br><span class="tcgb-label" style="margin-top:5px">38 Net Ağırlık</span><input id="tcgb-38" class="tcgb-input"></div>
        </div>
    </div>
</template>

<div id="decl-modal" class="modal-backdrop hidden"> 
    <div class="modal-box"> 
        <div class="modal-header"><h2>Araç Detayları</h2><button onclick="document.getElementById('decl-modal').classList.add('hidden')" class="btn-sm">Kapat</button></div> 
        <div class="modal-body"> 
            <input type="hidden" id="decl-edit-idx" value="-1"> 
            <div class="modal-section">
                <div class="modal-section-title">Beyanname Ön Bilgileri</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="input-group" style="grid-column:span 2;position:relative;">
                        <label style="display:flex;justify-content:space-between">Gönderici Firma <button class="btn-sm" style="padding:2px 6px;height:auto" onclick="window.addGondericiPrompt()">+ Ekle</button></label>
                        <input type="text" id="da-gonderici" oninput="window.filterList('gonderici',this.value)" onfocus="window.filterList('gonderici',this.value)" autocomplete="off">
                        <div id="da-gonderici-list" class="autocomplete-list"></div>
                    </div>
                    <div class="input-group" style="position:relative;">
                        <label style="display:flex;justify-content:space-between">GTİP <button class="btn-sm" style="padding:2px 6px;height:auto" onclick="window.addGTIPPrompt()">+ Ekle</button></label>
                        <input type="text" id="da-gtip" oninput="window.filterList('gtip',this.value)" onfocus="window.filterList('gtip',this.value)" autocomplete="off">
                        <div id="da-gtip-list" class="autocomplete-list"></div>
                    </div>
                    <div style="display:flex;gap:10px;">
                        <div class="input-group" style="flex:1"><label>Brüt(kg)</label><input type="text" id="da-brut"></div>
                        <div class="input-group" style="flex:1"><label>Net(kg)</label><input type="text" id="da-net"></div>
                    </div>
                </div>
            </div>
            <div class="modal-section">
                <div class="modal-section-title">Araç Bilgileri</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="input-group"><label>Firma</label><input type="text" id="da-firma"></div>
                    <div class="input-group"><label>Şasi</label><input type="text" id="da-sase"></div>
                    <div class="input-group"><label>Marka</label><input type="text" id="da-marka"></div>
                    <div class="input-group"><label>Fatura(€)</label><input type="text" id="da-fatura"></div>
                    <div class="input-group"><label>Evrak Durumu</label><select id="da-evrak"><option value="Açık">İşlemde (Açık)</option><option value="Kapalı">Kapalı</option></select></div>
                </div>
            </div> 
        </div> 
        <div class="modal-footer"><button onclick="window.saveDeclEntry()" class="btn-primary">Kaydet</button></div> 
    </div> 
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
const firebaseConfig = {apiKey: "AIzaSyDxlTVb_JsefQHCE8pFiOiDjMaEVZJNiI0", authDomain: "gumruk-portal.firebaseapp.com", databaseURL: "https://gumruk-portal-default-rtdb.europe-west1.firebasedatabase.app", projectId: "gumruk-portal", appId: "1:782266851006:web:30aa74f32f2ed36da4c8ef"};
const app = initializeApp(firebaseConfig); const db = getDatabase(app);

window._firebaseSave = async function(payload) { try { payload.gonderici = window.GondericiList; payload.gtip = window.GTIPList; await set(ref(db, 'portal_data'), payload); return true; } catch(e) { return false; }};
window._firebaseLoad = async function() { try { const snapshot = await get(ref(db, 'portal_data')); return snapshot.exists() ? snapshot.val() : null; } catch(e) { return null; }};
window._firebaseReady = true; if(typeof window._onFirebaseReady === 'function') window._onFirebaseReady();
</script>

<script>
    // --- GÖNDERİCİ VE GTİP AKILLI LİSTELERİ (Özetlenmiş Hali) ---
    window.GondericiList = [{id:"21US000661501",ad:"34 LLC SUNA TATAR"},{id:"25DE000992490",ad:"HM AUTOMOBİLE"}]; 
    window.GTIPList = [{kod:"8703.23.19.12.00",desc:"1600-2000 cm³ binek (yeni)"},{kod:"8703.80.10.00.11",desc:"Sadece elektrikli"}];
    
    window.declarationsData=[]; window.firmData={"ŞAMNU GT":[]}; 

    window.doLogin = function() {
        const u = document.getElementById('log-email').value.trim().toLowerCase(), p = document.getElementById('log-pass').value;
        const acc = {'admin':{pass:'Bayram2026',role:'admin',name:'Bayram'}, 'samnu':{pass:'samnu2026',role:'ŞAMNU GT',name:'Şamnu GT'}};
        if(acc[u] && acc[u].pass === p) {
            localStorage.setItem('gumruk_auth','true'); localStorage.setItem('gumruk_role',acc[u].role); localStorage.setItem('gumruk_user_name',acc[u].name);
            document.getElementById('login-screen').style.display='none'; window.applyRoleUI(); window.renderView('declarations');
        } else { document.getElementById('auth-alert').style.display='block'; }
    };
    
    window.applyRoleUI = function() {
        let r = localStorage.getItem('gumruk_role')||'admin', n = localStorage.getItem('gumruk_user_name')||'Bayram';
        if(document.querySelector('.user-name')) document.querySelector('.user-name').innerText = n;
        if(document.querySelector('.user-role')) document.querySelector('.user-role').innerText = r === 'admin' ? 'Yönetici' : 'Müşteri';
        document.querySelectorAll('.admin-only').forEach(el => r!=='admin'?el.classList.add('hidden-role'):el.classList.remove('hidden-role'));
    };

    window.addGondericiPrompt = function() {
        let ad=prompt("Firma Adı:"), id=prompt("Firma ID:");
        if(ad&&id) { window.GondericiList.unshift({id:id.trim(), ad:ad.trim().toUpperCase()}); window.saveData(); alert("Eklendi!"); }
    };
    window.addGTIPPrompt = function() {
        let k=prompt("GTİP Kodu:"), d=prompt("Açıklama:");
        if(k&&d) { window.GTIPList.unshift({kod:k.trim(), desc:d.trim()}); window.saveData(); alert("Eklendi!"); }
    };

    window.filterList = function(type, val) {
        let el = document.getElementById(`da-${type}-list`); let q = val.toLowerCase();
        let arr = type==='gonderici' ? window.GondericiList : window.GTIPList;
        let m = q ? arr.filter(x => (x.ad||x.desc).toLowerCase().includes(q) || (x.id||x.kod).includes(q)) : arr;
        if(m.length>0) {
            el.innerHTML = m.map(x => `<div class="autocomplete-item" onmousedown="document.getElementById('da-${type}').value='${type==='gonderici'?x.id+' - '+x.ad:x.kod}';this.parentElement.classList.remove('show')"><b>${type==='gonderici'?x.ad:x.kod}</b></div>`).join('');
            el.classList.add('show');
        } else el.classList.remove('show');
    };

    window.openDeclVehicleModal = function(idx) {
        document.getElementById('decl-modal').classList.remove('hidden'); document.getElementById('decl-edit-idx').value=idx;
        if(idx === -1) {
            ['firma','sase','marka','fatura','gonderici','gtip','brut','net'].forEach(id=>document.getElementById('da-'+id).value='');
            document.getElementById('da-evrak').value = 'Açık'; 
        } else {
            let d = window.declarationsData[idx];
            ['firma','sase','marka','fatura','gonderici','gtip','brut','net'].forEach(id=>document.getElementById('da-'+id).value=d[id]||'');
            document.getElementById('da-evrak').value = d.evrak || 'Kapalı';
        }
    };

    window.saveDeclEntry = function() {
        let v=id=>document.getElementById(id).value;
        let r={firma:v('da-firma'), sasi:v('da-sase'), marka:v('da-marka'), evrak:v('da-evrak'), fatura:v('da-fatura'), gonderici:v('da-gonderici'), gtip:v('da-gtip'), brut:v('da-brut'), net:v('da-net')};
        let i = parseInt(v('decl-edit-idx'));
        if(i===-1) window.declarationsData.unshift(r); else window.declarationsData[i] = r;
        window.saveData(); document.getElementById('decl-modal').classList.add('hidden'); window.renderDeclarationsTable();
    };

    window.renderDeclarationsTable = function() {
        let tb = document.getElementById('declarations-tbody'); if(!tb) return;
        let r = localStorage.getItem('gumruk_role');
        let list = r==='admin' ? window.declarationsData : window.declarationsData.filter(d=>d.firma===r);
        tb.innerHTML = list.map((d,i)=> `<tr>
            <td><b>${d.firma||'-'}</b><br><small>${d.marka||'-'}</small></td><td>${d.sasi||'-'}</td><td>${d.tarih||'-'}</td>
            <td><span class="badge badge-${d.evrak==='Açık'?'warning':'dark'}">${d.evrak||'Kapalı'}</span></td><td>${d.fatura||'-'}</td>
            <td style="text-align:center;">
                <div style="display:flex;gap:3px;justify-content:center;">
                    <button class="btn-sm admin-only" style="color:#10b981" onclick="window.openBeyanname(${i})">Beyanname</button>
                    <button class="btn-sm admin-only" onclick="window.openDeclVehicleModal(${i})">Düzenle</button>
                </div>
            </td>
        </tr>`).join('');
        window.applyRoleUI(); if(window.lucide) lucide.createIcons();
    };

    window.openBeyanname = function(idx) {
        let d = window.declarationsData[idx]; if(!d) return;
        window.renderView('beyanname');
        setTimeout(() => {
            document.getElementById('tcgb-2').value = d.gonderici||''; document.getElementById('tcgb-8').value = d.firma||'';
            document.getElementById('tcgb-33').value = d.gtip||''; document.getElementById('tcgb-35').value = d.brut||''; document.getElementById('tcgb-38').value = d.net||'';
            document.getElementById('tcgb-31').value = `MARKA: ${d.marka||''}\nŞASİ NO: ${d.sasi||''}`;
        }, 100);
    };

    window.saveData = function() {
        if(window._firebaseSave) window._firebaseSave({decl:window.declarationsData, firm:window.firmData, gonderici:window.GondericiList, gtip:window.GTIPList});
    };

    window.renderView=function(vn) {
        document.getElementById('view-container').innerHTML = document.getElementById('tpl-'+vn).innerHTML;
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===vn));
        if(vn==='declarations') window.renderDeclarationsTable();
        window.applyRoleUI(); if(window.lucide) lucide.createIcons();
    };

    document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.addEventListener('click',()=>window.renderView(b.dataset.view)));
    document.addEventListener('DOMContentLoaded',() => {
        if(localStorage.getItem('gumruk_auth')==='true') { document.getElementById('login-screen').style.display='none'; window.applyRoleUI(); window.renderView('declarations'); }
        if(window._firebaseReady) window._firebaseLoad().then(d=>{if(d){window.declarationsData=d.decl||[]; window.GondericiList=d.gonderici||window.GondericiList; window.GTIPList=d.gtip||window.GTIPList;} window.renderDeclarationsTable();});
        if(window.lucide) lucide.createIcons();
    });
</script>
</body>
</html>
